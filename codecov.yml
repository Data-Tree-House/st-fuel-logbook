codecov:
  bot: "codecov-io"

coverage:
  precision: 2
  range: "70...100"
  status:
    project:
      default:
        target: 70%
        threshold: 1%
    patch:
      default:
        target: 80%

comment:
  layout: "header, files, footer" # remove "new" from "header" and "footer"
  hide_project_coverage: false # set to false
